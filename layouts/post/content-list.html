<article class="post">
  {{ .Render "header" }}
  <div style="display: flex; gap: 40px; align-items: flex-start;">
    <div style="flex-shrink: 0;">
      {{ .Render "featured" }}
    </div>
    <div style="flex: 1;">
      {{ $.Scratch.Set "summary" (.Summary | plainify | truncate (default 500 .Site.Params.summary_length) (default "…" .Site.Params.text.truncated )) }}
      {{ $.Scratch.Get "summary" }}
    </div>
  </div>
  <footer>
    <a href="{{ .RelPermalink }}" class="button big">{{ i18n "read_more" }}</a>
    {{ .Render "stats" }}
  </footer>
</article>
